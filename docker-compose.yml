version: '3.9'

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: supportai-server:latest
    container_name: supportai-server
    restart: unless-stopped
    env_file:
      - ./server/.env          # secrets live here — never baked into the image
    environment:
      NODE_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads   # persist uploaded files across restarts
      - server_logs:/app/logs       # persist PM2 / app logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - supportai

  # ── Frontend (React → nginx) ─────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: supportai-client:latest
    container_name: supportai-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - supportai

volumes:
  uploads_data:
  server_logs:

networks:
  supportai:
    driver: bridge
